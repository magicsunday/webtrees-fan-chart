version: 2

updates:
    -   package-ecosystem: composer
        directory: /
        schedule:
            interval: weekly
        open-pull-requests-limit: 5
        cooldown:
            default-days: 7
        groups:
            composer:
                patterns:
                    - "*"

    -   package-ecosystem: npm
        directory: /
        schedule:
            interval: weekly
        open-pull-requests-limit: 5
        cooldown:
            default-days: 7
        groups:
            npm:
                patterns:
                    - "*"
                # The chart-lib bundle is baked into the committed *.min.js at
                # `make build` time, which Dependabot cannot run. Keep it out of
                # the grouped, auto-merged PR so it always arrives as its own
                # PR that a human reviews and rebuilds the bundle for.
                exclude-patterns:
                    - "@magicsunday/webtrees-chart-lib"

    -   package-ecosystem: github-actions
        directory: /
        schedule:
            interval: weekly
        cooldown:
            default-days: 7
        groups:
            github-actions:
                patterns:
                    - "*"
