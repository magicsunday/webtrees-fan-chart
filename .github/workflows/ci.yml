name: CI

on:
    push:
    pull_request:

jobs:
    build:
        runs-on: ubuntu-latest

        strategy:
            fail-fast: false
            matrix:
                php: [ '8.3', '8.4', '8.5' ]

        steps:
            -   id: checkout
                name: Checkout
                uses: actions/checkout@v4

            -   id: setup_node
                name: Set up Node.js
                uses: actions/setup-node@v4
                with:
                    node-version: 22
                    cache: npm

            -   id: setup_php
                name: Set up PHP version ${{ matrix.php }}
                uses: shivammathur/setup-php@v2
                with:
                    php-version: ${{ matrix.php }}
                    tools: composer:v2

            -   name: Validate composer.json and composer.lock
                run: composer validate

            -   id: composer-cache-vars
                name: Composer Cache Vars
                run: |
                    echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
                    echo "timestamp=$(date +"%s")" >> $GITHUB_OUTPUT

            -   id: composer-cache-dependencies
                name: Cache Composer dependencies
                uses: actions/cache@v4
                with:
                    path: ${{ steps.composer-cache-vars.outputs.dir }}
                    key: ${{ runner.os }}-composer-${{ matrix.php }}-${{ steps.composer-cache-vars.outputs.timestamp }}
                    restore-keys: |
                        ${{ runner.os }}-composer-${{ matrix.php }}-
                        ${{ runner.os }}-composer-

            -   id: install
                name: Install dependencies
                run: |
                    composer install --no-progress
                    npm ci

            -   id: php-lint
                name: PHP Lint
                if: ${{ always() && steps.install.conclusion == 'success' }}
                run: |
                    composer ci:test:php:lint

            -   id: js-lint
                name: JS Lint
                if: ${{ always() && steps.install.conclusion == 'success' }}
                run: |
                    composer ci:test:js:lint

            -   id: phpstan
                name: PHPStan
                if: ${{ always() && steps.install.conclusion == 'success' }}
                run: |
                    composer ci:test:php:phpstan -- --error-format=github

            -   id: rector
                name: Rector
                if: ${{ always() && steps.install.conclusion == 'success' }}
                run: |
                    composer ci:test:php:rector

            -   id: cpd
                name: Copy/Paste Detection
                if: ${{ always() && steps.install.conclusion == 'success' }}
                run: |
                    composer ci:test:php:cpd

            -   id: php-unit
                name: PHP Unit Tests
                if: ${{ always() && steps.install.conclusion == 'success' }}
                run: |
                    composer ci:test:php:unit

            -   id: js-unit
                name: JS Unit Tests
                if: ${{ always() && steps.install.conclusion == 'success' }}
                run: |
                    composer ci:test:js:unit

            -   id: cgl
                name: CGL
                if: ${{ always() && steps.install.conclusion == 'success' }}
                run: |
                    composer ci:cgl -- --dry-run

            # Runs LAST: 'make dist' invokes 'composer install --no-dev'
            # which strips dev packages (php-cs-fixer, phpstan, ...) from
            # .build/vendor. Any later composer-driven step would fail.
            -   id: dist-smoke
                name: Release zip smoke test
                if: ${{ always() && steps.install.conclusion == 'success' }}
                run: |
                    set -euo pipefail
                    make dist
                    zips=( *.zip )
                    if [ "${#zips[@]}" -ne 1 ]; then
                      echo "ERROR: expected exactly 1 zip, found ${#zips[@]}"; exit 1
                    fi
                    zip="${zips[0]}"
                    listing=$(unzip -l "$zip")
                    # Required entries
                    for required in \
                      'module.php' \
                      'LICENSE' \
                      'vendor/magicsunday/webtrees-module-base/src/Model/' \
                      'vendor/magicsunday/webtrees-module-base/src/Module/' \
                      'vendor/magicsunday/webtrees-module-base/src/Processor/' \
                    ; do
                      echo "$listing" | grep -qE "[[:space:]]${required}\$|[[:space:]]${required}[[:space:]]*\$|${required}[A-Za-z]" \
                        || { echo "ERROR: required entry missing from $zip: $required"; exit 1; }
                    done
                    # Forbidden entries
                    if echo "$listing" | grep -E '^[[:space:]]+[0-9]+.*composer\.json$' >/dev/null; then
                      echo "ERROR: composer.json found in $zip"; exit 1
                    fi
                    if echo "$listing" | grep -E '^[[:space:]]+[0-9]+.*[[:space:]]assets/' >/dev/null; then
                      echo "ERROR: assets/ found in $zip"; exit 1
                    fi
                    rm -f "$zip"
