name: CI

on:
    push:
    pull_request:

jobs:
    build:
        runs-on: ubuntu-latest

        strategy:
            fail-fast: false
            matrix:
                php: [ '8.3', '8.4', '8.5' ]

        steps:
            -   id: checkout
                name: Checkout
                uses: actions/checkout@v4

            -   id: setup_node
                name: Set up Node.js
                uses: actions/setup-node@v4
                with:
                    node-version: 22
                    cache: npm

            -   id: setup_php
                name: Set up PHP version ${{ matrix.php }}
                uses: shivammathur/setup-php@v2
                with:
                    php-version: ${{ matrix.php }}
                    tools: composer:v2

            -   name: Validate composer.json and composer.lock
                run: composer validate

            -   id: composer-cache-vars
                name: Composer Cache Vars
                run: |
                    echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
                    echo "timestamp=$(date +"%s")" >> $GITHUB_OUTPUT

            -   id: composer-cache-dependencies
                name: Cache Composer dependencies
                uses: actions/cache@v4
                with:
                    path: ${{ steps.composer-cache-vars.outputs.dir }}
                    key: ${{ runner.os }}-composer-${{ matrix.php }}-${{ steps.composer-cache-vars.outputs.timestamp }}
                    restore-keys: |
                        ${{ runner.os }}-composer-${{ matrix.php }}-
                        ${{ runner.os }}-composer-

            -   id: install
                name: Install dependencies
                run: |
                    composer install --no-progress
                    npm ci

            -   id: php-lint
                name: PHP Lint
                if: ${{ always() && steps.install.conclusion == 'success' }}
                run: |
                    composer ci:test:php:lint

            -   id: js-lint
                name: JS Lint
                if: ${{ always() && steps.install.conclusion == 'success' }}
                run: |
                    composer ci:test:js:lint

            -   id: phpstan
                name: PHPStan
                if: ${{ always() && steps.install.conclusion == 'success' }}
                run: |
                    composer ci:test:php:phpstan -- --error-format=github

            -   id: rector
                name: Rector
                if: ${{ always() && steps.install.conclusion == 'success' }}
                run: |
                    composer ci:test:php:rector

            -   id: cpd
                name: Copy/Paste Detection
                if: ${{ always() && steps.install.conclusion == 'success' }}
                run: |
                    composer ci:test:php:cpd

            -   id: php-unit
                name: PHP Unit Tests
                if: ${{ always() && steps.install.conclusion == 'success' }}
                run: |
                    composer ci:test:php:unit

            -   id: js-unit
                name: JS Unit Tests
                if: ${{ always() && steps.install.conclusion == 'success' }}
                run: |
                    composer ci:test:js:unit

            -   id: dist-smoke
                name: Release zip smoke test
                if: ${{ always() && steps.install.conclusion == 'success' }}
                run: |
                    make dist
                    zip=$(ls *.zip)
                    unzip -l "$zip" | grep -q 'vendor/magicsunday/webtrees-module-base/src/Processor' \
                      || { echo "ERROR: module-base Processor classes missing from $zip"; exit 1; }
                    if unzip -l "$zip" | grep -E '^[[:space:]]+[0-9]+.*composer\.json$' >/dev/null; then
                      echo "ERROR: composer.json found in $zip"; exit 1
                    fi
                    rm -f "$zip"

            -   id: cgl
                name: CGL
                if: ${{ always() && steps.install.conclusion == 'success' }}
                run: |
                    composer ci:cgl -- --dry-run
